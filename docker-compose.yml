version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      - BIND_HOST=0.0.0.0
      - PORT=3000
      - DATABASE_URL=sqlite:///data/flowcore.db?mode=rwc
    volumes:
      - backend_data:/data
    ports:
      - "127.0.0.1:12000:3000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "127.0.0.1:13000:80"

volumes:
  backend_data: