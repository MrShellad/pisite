services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      - BIND_HOST=0.0.0.0
      - PORT=3000
      - DATABASE_URL=sqlite:///data/flowcore.db?mode=rwc
    volumes:
      - backend_data:/data
    ports:
      - "3000:3000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  backend_data:

